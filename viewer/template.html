<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Radar · Collaboration Report</title>
<style>
  :root {
    /* ── Warm editorial light theme ── */
    --paper: #f7f5f0;
    --card: #ffffff;
    --card-2: #f3f1ea;
    --ink: #1c1b17;
    --ink-2: #55524a;
    --ink-3: #8a8579;
    --ink-4: #b3aea1;
    --line: rgba(28,27,23,0.09);
    --line-2: rgba(28,27,23,0.16);
    --accent: #c14d2e;
    --accent-ink: #a8401f;
    --accent-soft: rgba(193,77,46,0.07);
    --accent-soft-2: rgba(193,77,46,0.14);
    --good: #1e7a46;
    --good-soft: rgba(30,122,70,0.08);
    --shadow: 0 1px 2px rgba(28,27,23,0.04), 0 6px 24px rgba(28,27,23,0.05);
    /* grades — always paired with the letter, never color-alone */
    --grade-s: #1d7a46; --grade-a: #2a6fb8; --grade-b: #a8740c; --grade-c: #c05627; --grade-d: #c03434;
    /* categories — validated trio (light) */
    --cat-comm: #c14d2e; --cat-eng: #0083a8; --cat-out: #976800;
    --radar-grid: rgba(28,27,23,0.10);
  }
  html[data-theme="dark"] {
    --paper: #171613; --card: #262521; --card-2: #2e2b25;
    --ink: #edeae2; --ink-2: #b8b3a6; --ink-3: #8a8579; --ink-4: #5f5b51;
    --line: rgba(255,255,255,0.08); --line-2: rgba(255,255,255,0.15);
    --accent: #e0805a; --accent-ink: #e8946f;
    --accent-soft: rgba(224,128,90,0.10); --accent-soft-2: rgba(224,128,90,0.20);
    --good: #3fae6e; --good-soft: rgba(63,174,110,0.12);
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 6px 24px rgba(0,0,0,0.25);
    --grade-s: #3fae6e; --grade-a: #6aa5e8; --grade-b: #d2a63e; --grade-c: #e08653; --grade-d: #e36a6a;
    --cat-comm: #d9713f; --cat-eng: #2e9fb5; --cat-out: #bc8a22;
    --radar-grid: rgba(255,255,255,0.12);
  }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) {
      --paper: #171613; --card: #262521; --card-2: #2e2b25;
      --ink: #edeae2; --ink-2: #b8b3a6; --ink-3: #8a8579; --ink-4: #5f5b51;
      --line: rgba(255,255,255,0.08); --line-2: rgba(255,255,255,0.15);
      --accent: #e0805a; --accent-ink: #e8946f;
      --accent-soft: rgba(224,128,90,0.10); --accent-soft-2: rgba(224,128,90,0.20);
      --good: #3fae6e; --good-soft: rgba(63,174,110,0.12);
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 6px 24px rgba(0,0,0,0.25);
      --grade-s: #3fae6e; --grade-a: #6aa5e8; --grade-b: #d2a63e; --grade-c: #e08653; --grade-d: #e36a6a;
      --cat-comm: #d9713f; --cat-eng: #2e9fb5; --cat-out: #bc8a22;
      --radar-grid: rgba(255,255,255,0.12);
    }
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: Charter, Georgia, Cambria, "Times New Roman", "Songti SC", "Noto Serif SC", "STSong", "SimSun", serif; }

  .page { max-width: 920px; margin: 0 auto; padding: 0 28px 90px; }

  /* ═══ Topbar ═══ */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-in {
    max-width: 920px; margin: 0 auto; padding: 13px 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 14px; letter-spacing: -0.2px; }
  .brand svg { width: 21px; height: 21px; color: var(--accent); }
  .topbar-project { font-size: 12.5px; color: var(--ink-3); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-project strong { color: var(--ink-2); font-weight: 600; }
  .toggle-group { display: flex; gap: 6px; }
  .tbtn {
    font: inherit; font-size: 11.5px; font-weight: 600;
    color: var(--ink-3); background: transparent;
    border: 1px solid var(--line-2); border-radius: 7px;
    padding: 4px 10px; cursor: pointer;
  }
  .tbtn:hover { color: var(--ink); border-color: var(--ink-3); }
  .tbtn.on { color: var(--accent-ink); border-color: var(--accent); background: var(--accent-soft); }

  /* ═══ Section chrome ═══ */
  .section { margin-top: 64px; scroll-margin-top: 70px; }
  .sec-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
  .sec-no { font-size: 12.5px; color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
  .sec-title { font-family: Charter, Georgia, Cambria, "Songti SC", "Noto Serif SC", "STSong", serif; font-size: 21px; font-weight: 700; letter-spacing: 0.2px; }
  .sec-hint { font-size: 12px; color: var(--ink-3); margin-left: auto; }

  /* ═══ Verdict hero ═══ */
  .hero { display: grid; grid-template-columns: 1fr 360px; gap: 36px; align-items: center; padding: 52px 0 8px; }
  .kicker {
    display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: 12px; color: var(--ink-3); margin-bottom: 20px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3.5px 11px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; line-height: 1.5;
    background: var(--accent-soft); color: var(--accent-ink);
    border: 1px solid var(--accent-soft-2);
  }
  .chip.neutral { background: transparent; color: var(--ink-2); border-color: var(--line-2); }
  .grade-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .grade-letter { font-size: 72px; line-height: 0.85; font-weight: 700; letter-spacing: -2px; }
  .grade-sub .g-label { font-size: 15px; font-weight: 700; letter-spacing: 0.2px; }
  .grade-sub .g-score { font-size: 12.5px; color: var(--ink-3); font-variant-numeric: tabular-nums; margin-top: 3px; }
  .insight {
    font-size: 25px; line-height: 1.52; font-weight: 500;
    letter-spacing: 0.1px; margin: 0 0 20px; color: var(--ink);
    text-wrap: balance;
  }
  .hero-meta { font-size: 12px; color: var(--ink-3); display: flex; column-gap: 14px; row-gap: 6px; flex-wrap: wrap; align-items: center; }
  .hero-meta .m { white-space: nowrap; }
  .hero-meta .m + .m { position: relative; padding-left: 14px; }
  .hero-meta .m + .m::before { content: "·"; position: absolute; left: 3px; color: var(--ink-4); }
  .cat-mini { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; font-weight: 600; color: var(--ink-2); }
  .cat-mini i { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .cat-mini b { font-variant-numeric: tabular-nums; font-weight: 800; }
  .hero-cats { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 10px; font-size: 12px; }

  .radar-wrap { position: relative; }
  .radar-wrap svg { width: 100%; height: auto; display: block; }
  .radar-tip {
    position: absolute; pointer-events: none; opacity: 0;
    background: var(--ink); color: var(--paper);
    font-size: 11.5px; font-weight: 600; padding: 5px 9px; border-radius: 7px;
    transform: translate(-50%, -130%); white-space: nowrap;
    transition: opacity 0.12s ease;
  }

  /* since-last-run strip */
  .since {
    margin-top: 32px; padding: 15px 20px;
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    font-size: 12.5px; color: var(--ink-2); box-shadow: var(--shadow);
  }
  .since-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink-3); }
  .delta { padding: 2px 9px; border-radius: 999px; background: var(--card-2); font-variant-numeric: tabular-nums; }
  .delta b.up { color: var(--good); } .delta b.down { color: var(--grade-d); }
  .since-note { flex-basis: 100%; font-size: 12.5px; color: var(--ink-3); }
  .since-adopted { color: var(--good); font-weight: 600; }
  .since-adopted::before { content: "✓ "; }

  /* ═══ Key findings ═══ */
  .findings { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  .finding {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 22px 24px; box-shadow: var(--shadow); position: relative;
  }
  .finding::before { content: ""; position: absolute; left: 0; top: 16px; bottom: 16px; width: 3px; border-radius: 0 3px 3px 0; }
  .finding.strength::before { background: var(--good); }
  .finding.bottleneck::before { background: var(--accent); }
  .finding-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .finding.strength .finding-label { color: var(--good); }
  .finding.bottleneck .finding-label { color: var(--accent-ink); }
  .finding-dim { margin-left: auto; font-size: 10.5px; font-weight: 600; letter-spacing: 0.3px; color: var(--ink-3); background: var(--card-2); padding: 2px 9px; border-radius: 999px; text-transform: none; }
  .finding-text { font-size: 14px; line-height: 1.7; color: var(--ink-2); }
  .finding-text strong { color: var(--ink); }
  .pull-quote {
    margin: 24px 6px 0; padding-left: 20px;
    border-left: 2px solid var(--accent);
    font-size: 16px; line-height: 1.75; color: var(--ink-2); font-style: italic;
  }

  /* ═══ Key actions ═══ */
  .action-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 26px 28px 24px; box-shadow: var(--shadow); margin-bottom: 16px;
    position: relative; overflow: hidden;
  }
  .action-card::after {
    content: attr(data-no); position: absolute; top: 6px; right: 20px;
    font-family: Georgia, "Songti SC", serif; font-size: 64px; font-weight: 700;
    color: var(--ink); opacity: 0.05; line-height: 1;
  }
  .action-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .pill { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: 0.5px; text-transform: uppercase; }
  .pill-high { background: rgba(192,52,52,0.12); color: var(--grade-d); }
  .pill-medium { background: rgba(168,122,24,0.14); color: var(--grade-b); }
  .pill-low { background: rgba(42,111,184,0.12); color: var(--grade-a); }
  .pill-type { background: var(--card-2); color: var(--ink-2); }
  .pill-dim { background: transparent; border: 1px solid var(--line-2); color: var(--ink-3); font-weight: 600; text-transform: none; }
  .action-title { font-size: 17.5px; font-weight: 700; letter-spacing: -0.2px; margin: 6px 0 8px; }
  .action-body { font-size: 14px; color: var(--ink-2); line-height: 1.7; margin-bottom: 14px; max-width: 640px; }
  .evidence {
    font-size: 12.5px; color: var(--ink-3); line-height: 1.6;
    padding: 10px 14px; background: var(--card-2); border-radius: 9px; margin-bottom: 14px;
  }
  .evidence b { color: var(--ink-2); font-weight: 700; font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase; margin-right: 6px; }
  .prompt-block {
    background: var(--accent-soft); border: 1px solid var(--accent-soft-2);
    border-radius: 12px; padding: 14px 16px;
  }
  .prompt-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .prompt-label { font-size: 10.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--accent-ink); }
  .copy-btn {
    font: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    color: var(--accent-ink); background: var(--card);
    border: 1px solid var(--accent-soft-2); border-radius: 7px;
    padding: 4px 12px; cursor: pointer;
  }
  .copy-btn:hover { border-color: var(--accent); }
  .copy-btn.copied { color: var(--good); border-color: var(--good); }
  .prompt-text { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; line-height: 1.7; color: var(--ink); white-space: pre-wrap; word-break: break-word; }
  .asset-block { margin-top: 12px; background: var(--card-2); border: 1px dashed var(--line-2); border-radius: 12px; padding: 14px 16px; }
  .asset-block .prompt-label { color: var(--ink-2); }
  .asset-block pre { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 12px; line-height: 1.6; color: var(--ink-2); white-space: pre-wrap; word-break: break-word; margin: 0; }
  .install-hint { margin-top: 8px; font-size: 11.5px; color: var(--ink-3); }
  .impact { margin-top: 12px; font-size: 12.5px; color: var(--ink-3); }
  .impact::before { content: "→ "; color: var(--accent); font-weight: 700; }

  /* more suggestions accordion */
  .more-list { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
  .more-title { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 2px; }
  details.sg { background: var(--card); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); }
  details.sg summary {
    list-style: none; cursor: pointer; padding: 15px 20px;
    display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600;
  }
  details.sg summary::-webkit-details-marker { display: none; }
  details.sg summary .chev { margin-left: auto; color: var(--ink-4); transition: transform 0.2s ease; font-size: 12px; }
  details.sg[open] summary .chev { transform: rotate(90deg); }
  details.sg .sg-body { padding: 2px 20px 20px; border-top: 1px solid var(--line); padding-top: 16px; margin: 0 0; }
  details.sg summary:hover { color: var(--accent-ink); }

  /* ═══ Dimension scores ═══ */
  .cat-group { background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
  .cat-head { display: flex; align-items: center; gap: 10px; padding: 16px 22px; border-bottom: 1px solid var(--line); }
  .cat-dot { width: 9px; height: 9px; border-radius: 50%; }
  .cat-name { font-size: 14px; font-weight: 700; }
  .cat-desc { font-size: 12px; color: var(--ink-3); }
  .cat-score { margin-left: auto; display: flex; align-items: baseline; gap: 8px; }
  .cat-score .n { font-size: 21px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .grade-chip { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 6px; }
  details.dim { border-top: 1px solid var(--line); }
  details.dim:first-of-type { border-top: none; }
  details.dim summary {
    list-style: none; cursor: pointer;
    display: grid; grid-template-columns: 150px 1fr 44px 20px; gap: 14px; align-items: center;
    padding: 13px 22px;
  }
  details.dim summary::-webkit-details-marker { display: none; }
  details.dim summary:hover { background: var(--card-2); }
  .dim-name { font-size: 13.5px; font-weight: 600; color: var(--ink); }
  .dim-name.na { color: var(--ink-4); font-weight: 500; }
  .dim-bar { display: block; height: 5px; background: var(--card-2); border-radius: 999px; overflow: hidden; }
  html[data-theme="dark"] .dim-bar { background: rgba(255,255,255,0.07); }
  .dim-fill { display: block; height: 100%; border-radius: 999px; }
  .dim-score { font-size: 13px; font-weight: 800; text-align: right; font-variant-numeric: tabular-nums; }
  .dim-score.na { color: var(--ink-4); font-size: 11px; font-weight: 700; }
  details.dim .chev { color: var(--ink-4); font-size: 11px; transition: transform 0.2s ease; justify-self: end; }
  details.dim[open] .chev { transform: rotate(90deg); }
  .dim-detail { padding: 4px 22px 20px 22px; }
  .dim-desc { font-size: 12px; color: var(--ink-3); margin-bottom: 10px; }
  .dim-reason { font-size: 13.5px; color: var(--ink-2); line-height: 1.7; margin-bottom: 12px; max-width: 700px; }
  .dim-evi { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .dim-evi li { font-size: 12px; color: var(--ink-3); padding-left: 16px; position: relative; line-height: 1.6; }
  .dim-evi li::before { content: "▸"; position: absolute; left: 0; color: var(--ink-4); }
  .dim-baseline { font-size: 11px; color: var(--ink-4); margin-top: 10px; font-variant-numeric: tabular-nums; }

  /* ═══ Profile narrative ═══ */
  .narrative {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 30px 34px; box-shadow: var(--shadow);
    font-size: 15px; line-height: 1.85; color: var(--ink-2); max-width: 100%;
  }
  .narrative p { margin: 0; }
  .narrative p::first-letter { font-size: 1.15em; font-weight: 700; color: var(--ink); }

  /* ═══ Appendix ═══ */
  details.appendix { border: 1px solid var(--line); border-radius: 14px; background: var(--card); box-shadow: var(--shadow); }
  details.appendix > summary {
    list-style: none; cursor: pointer; padding: 16px 22px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 10px; color: var(--ink-2);
  }
  details.appendix > summary::-webkit-details-marker { display: none; }
  details.appendix > summary .chev { margin-left: auto; color: var(--ink-4); font-size: 12px; transition: transform 0.2s ease; }
  details.appendix[open] > summary .chev { transform: rotate(90deg); }
  .appendix-body { padding: 6px 22px 22px; border-top: 1px solid var(--line); padding-top: 18px; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 18px; }
  .stat { background: var(--card-2); border-radius: 10px; padding: 10px 13px; }
  .stat .v { font-size: 17px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .stat .k { font-size: 11px; color: var(--ink-3); margin-top: 1px; }
  .tool-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .tool-cols h4 { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink-3); margin: 0 0 9px; }
  .tool-list { list-style: none; margin: 0 0 14px; padding: 0; }
  .tool-list li { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--ink-2); padding: 3px 0; }
  .tool-list .count { color: var(--ink-3); font-variant-numeric: tabular-nums; font-weight: 600; }
  .tool-empty { font-size: 12px; color: var(--ink-4); font-style: italic; margin-bottom: 14px; }
  .asset-pills { display: flex; flex-wrap: wrap; gap: 7px; }
  .apill { font-size: 11.5px; padding: 5px 11px; border-radius: 999px; background: var(--card-2); color: var(--ink-3); display: inline-flex; align-items: center; gap: 6px; }
  .apill.yes { background: var(--good-soft); color: var(--good); font-weight: 600; }
  .apill::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  footer { margin-top: 70px; padding-top: 20px; border-top: 1px solid var(--line); font-size: 11.5px; color: var(--ink-4); text-align: center; letter-spacing: 0.3px; }

  /* ═══ Responsive / print ═══ */
  @media (max-width: 760px) {
    .hero { grid-template-columns: 1fr; gap: 24px; }
    .radar-wrap { max-width: 380px; margin: 0 auto; }
    .findings { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .tool-cols { grid-template-columns: 1fr; }
    .insight { font-size: 21px; }
    details.dim summary { grid-template-columns: 110px 1fr 40px 16px; gap: 10px; padding: 13px 16px; }
    .page { padding: 0 18px 70px; }
    .topbar-in { padding: 11px 18px; }
  }
  @media print {
    .topbar { display: none; }
    body { background: #fff; }
    .action-card, .finding, .cat-group, .narrative { break-inside: avoid; box-shadow: none; }
    details.dim, details.appendix, details.sg { open: true; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <svg viewBox="0 0 32 32" fill="none"><polygon points="16 3 28 9.5 28 22.5 16 29 4 22.5 4 9.5" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/><circle cx="16" cy="16" r="2.6" fill="currentColor"/></svg>
      <span>Claude Radar</span>
    </div>
    <div class="topbar-project" id="topbarProject"></div>
    <div class="toggle-group">
      <button class="tbtn" id="langZh">中文</button>
      <button class="tbtn" id="langEn">EN</button>
      <button class="tbtn" id="themeBtn" title="theme">◐</button>
    </div>
  </div>
</div>

<div class="page">

  <!-- ─── Verdict ─── -->
  <section class="hero" id="verdict">
    <div class="hero-left">
      <div class="kicker" id="kicker"></div>
      <div class="grade-row">
        <div class="grade-letter serif" id="gradeLetter"></div>
        <div class="grade-sub">
          <div class="g-label" id="gradeLabel"></div>
          <div class="g-score" id="gradeScore"></div>
        </div>
      </div>
      <p class="insight serif" id="insight"></p>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-cats" id="heroCats"></div>
    </div>
    <div class="radar-wrap" id="radarWrap"></div>
  </section>

  <div id="sinceWrap"></div>

  <!-- ─── Key findings ─── -->
  <section class="section" id="findings">
    <div class="sec-head">
      <span class="sec-no">01</span>
      <span class="sec-title" data-i="secFindings"></span>
      <span class="sec-hint" data-i="secFindingsHint"></span>
    </div>
    <div class="findings" id="findingCards"></div>
    <div class="pull-quote serif" id="crossReading"></div>
  </section>

  <!-- ─── Key actions ─── -->
  <section class="section" id="actions">
    <div class="sec-head">
      <span class="sec-no">02</span>
      <span class="sec-title" data-i="secActions"></span>
      <span class="sec-hint" data-i="secActionsHint"></span>
    </div>
    <div id="keyActions"></div>
    <div class="more-list" id="moreWrap"></div>
  </section>

  <!-- ─── Dimensions ─── -->
  <section class="section" id="dimensions">
    <div class="sec-head">
      <span class="sec-no">03</span>
      <span class="sec-title" data-i="secDims"></span>
      <span class="sec-hint" data-i="secDimsHint"></span>
    </div>
    <div id="dimGroups"></div>
  </section>

  <!-- ─── Profile narrative ─── -->
  <section class="section" id="profile">
    <div class="sec-head">
      <span class="sec-no">04</span>
      <span class="sec-title" data-i="secProfile"></span>
    </div>
    <div class="narrative"><p id="profileText"></p></div>
  </section>

  <!-- ─── Appendix ─── -->
  <section class="section" id="appendix">
    <details class="appendix">
      <summary><span data-i="secAppendix"></span><span class="chev">▶</span></summary>
      <div class="appendix-body" id="appendixBody"></div>
    </details>
  </section>

  <footer id="footer"></footer>
</div>

<script id="report-data" type="application/json">{{REPORT_DATA}}</script>
<script>
(function() {
  const GRADE_DESC = {
    S: { en: 'In The Zone', zh: '心流共振' }, A: { en: 'Synced Up', zh: '默契搭档' },
    B: { en: 'Finding Groove', zh: '稳步探索' }, C: { en: 'Freestyling', zh: '随性对话' },
    D: { en: 'Day One', zh: '初识旅程' }
  };
  const CAT_NAMES = {
    communication: { en: 'Communication', zh: '沟通力' },
    engineering: { en: 'Engineering', zh: '工程力' },
    outcome: { en: 'Outcome', zh: '成效' }
  };
  const CAT_DESC = {
    communication: { en: 'How clearly you direct AI', zh: '你怎么用文字驱动 AI' },
    engineering: { en: 'How well you leverage the platform', zh: '你把平台用到几成' },
    outcome: { en: 'What actually gets shipped', zh: '实际产出的质量' }
  };
  const ACTION_NAMES = {
    prompt: { en: 'Prompt', zh: '话术' }, habit: { en: 'Habit', zh: '习惯' },
    setup: { en: 'Setup', zh: '装置' }, orchestration: { en: 'Orchestration', zh: '编排' }
  };
  const I18N = {
    secFindings: { en: 'Key Findings', zh: '重点评价' },
    secFindingsHint: { en: 'Your strongest edge & sharpest bottleneck', zh: '最强的一面 · 最卡的一环' },
    secActions: { en: 'Do These Next', zh: '重点建议' },
    secActionsHint: { en: 'Start with the top ones', zh: '先做前面这几件' },
    secDims: { en: 'Nine Dimensions', zh: '九维得分' },
    secDimsHint: { en: 'Click a row for the full reasoning', zh: '点开任意一行看评分依据' },
    secProfile: { en: 'Collaboration Profile', zh: '协作画像' },
    secAppendix: { en: 'Appendix · Toolcraft & Project Assets', zh: '附录 · 工具使用与项目资产' },
    strength: { en: 'Strength', zh: '最强项' },
    bottleneck: { en: 'Bottleneck', zh: '最大瓶颈' },
    moreSuggestions: { en: 'More suggestions', zh: '更多建议' },
    promptRewrite: { en: 'Try this prompt', zh: '复制这段试试' },
    assetLabel: { en: 'Installable asset', zh: '可安装资产' },
    installHint: { en: 'Paste to Claude: "Create this file with the content below."', zh: '贴给 Claude：「按下面的内容帮我创建这个文件」' },
    copy: { en: 'Copy', zh: '复制' }, copied: { en: 'Copied ✓', zh: '已复制 ✓' },
    evidence: { en: 'Evidence', zh: '证据' },
    sessions: { en: 'sessions', zh: '个会话' }, messages: { en: 'messages', zh: '条消息' },
    days: { en: 'days', zh: '天' }, confidence: { en: 'confidence', zh: '可信度' },
    sinceTitle: { en: 'Since last check-up', zh: '距上次体检' },
    overall: { en: 'Overall', zh: '总分' },
    naLabel: { en: 'N/A', zh: 'N/A' },
    naReason: { en: 'Not applicable for this project type', zh: '此项目类型不适用' },
    baseline: { en: 'baseline', zh: '基线' }, adjustment: { en: 'adjustment', zh: '调整' },
    footer: { en: 'Claude Radar — 100% local analysis, zero telemetry.', zh: 'Claude Radar — 全本地分析，零数据上传。' },
    toolCalls: { en: 'Tool calls', zh: '工具调用' }, planMode: { en: 'Plan mode', zh: 'Plan 模式' },
    customCmds: { en: 'Custom commands', zh: '自定义命令' },
    parallel: { en: 'Parallel bursts', zh: '并行爆发' }, background: { en: 'Background tasks', zh: '后台任务' },
    skillsUsed: { en: 'Skills used', zh: '使用的 Skill' }, mcpServers: { en: 'MCP servers', zh: 'MCP 服务' },
    topTools: { en: 'Top tools', zh: '高频工具' }, projectAssets: { en: 'Project assets', zh: '项目资产' },
    none: { en: 'None', zh: '无' }
  };

  let report;
  try { report = JSON.parse(document.getElementById('report-data').textContent); }
  catch (e) { document.body.innerHTML = '<div style="padding:40px;font-family:monospace">Failed to parse report data: ' + e.message + '</div>'; return; }

  let lang = report.language === 'en' ? 'en' : 'zh';

  const css = k => getComputedStyle(document.documentElement).getPropertyValue(k).trim();
  const gradeColor = g => g ? css('--grade-' + g.toLowerCase()) : css('--ink-4');
  const catColor = c => css('--cat-' + (c === 'communication' ? 'comm' : c === 'engineering' ? 'eng' : 'out'));

  function t(f) {
    if (f == null) return '';
    if (typeof f === 'string') return f;
    if (typeof f === 'object') return f[lang] || f.en || f.zh || '';
    return String(f);
  }
  const tc = k => (I18N[k] && (I18N[k][lang] || I18N[k].en)) || '';
  const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtDate = iso => { try { return new Date(iso).toLocaleDateString(lang === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' }); } catch { return iso; } };
  const md = s => esc(s).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  function gradeFromScore(s) { if (s == null) return null; return s >= 85 ? 'S' : s >= 70 ? 'A' : s >= 55 ? 'B' : s >= 40 ? 'C' : 'D'; }

  // highlights: prefer schema-2.2 structured field, fall back to parsing coreDiagnosis
  function getHighlights() {
    if (report.highlights && report.highlights.strength) return report.highlights;
    const dx = (report.diagnosis && report.diagnosis.coreDiagnosis) || {};
    const out = { strength: { text: {} }, bottleneck: { text: {} } };
    let ok = false;
    [['en', 'Strength', 'Bottleneck'], ['zh', '强项', '瓶颈']].forEach(([L, sk, bk]) => {
      const src = dx[L] || '';
      const m = src.match(new RegExp('\\*\\*' + sk + '\\*\\*[：:]?\\s*([\\s\\S]*?)\\*\\*' + bk + '\\*\\*[：:]?\\s*([\\s\\S]*)'));
      if (m) { out.strength.text[L] = m[1].trim(); out.bottleneck.text[L] = m[2].trim(); ok = true; }
    });
    return ok ? out : null;
  }

  // ═══ Radar ═══
  function renderRadar() {
    const wrap = document.getElementById('radarWrap');
    const dims = report.dimensions || [];
    const n = dims.length;
    if (!n) { wrap.innerHTML = ''; return; }
    const W = 400, H = 330, CX = W / 2, CY = 164, R = 102, LR = R + 26;
    const pt = (i, r) => {
      const a = -Math.PI / 2 + (2 * Math.PI * i) / n;
      return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
    };
    let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="radar">';
    // grid rings
    [0.25, 0.5, 0.75, 1].forEach(f => {
      const pts = dims.map((_, i) => pt(i, R * f).map(v => v.toFixed(1)).join(',')).join(' ');
      svg += '<polygon points="' + pts + '" fill="none" stroke="var(--radar-grid)" stroke-width="1"/>';
    });
    // spokes
    dims.forEach((_, i) => {
      const [x, y] = pt(i, R);
      svg += '<line x1="' + CX + '" y1="' + CY + '" x2="' + x.toFixed(1) + '" y2="' + y.toFixed(1) + '" stroke="var(--radar-grid)" stroke-width="1"/>';
    });
    // polygon over applicable dims
    const app = dims.map((d, i) => ({ d, i })).filter(o => o.d.applicable !== false && o.d.score != null);
    if (app.length >= 3) {
      const poly = app.map(o => pt(o.i, R * o.d.score / 100).map(v => v.toFixed(1)).join(',')).join(' ');
      svg += '<polygon points="' + poly + '" fill="var(--accent)" fill-opacity="0.13" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>';
    }
    // dots
    app.forEach(o => {
      const [x, y] = pt(o.i, R * o.d.score / 100);
      svg += '<circle class="rdot" data-name="' + esc(t(o.d.name)) + '" data-score="' + o.d.score + '" cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="4" fill="var(--card)" stroke="var(--accent)" stroke-width="2.2" style="cursor:default"/>';
    });
    // labels: name + score, score colored by grade (letter+number always shown → color not alone)
    dims.forEach((d, i) => {
      const [x, y] = pt(i, LR);
      const anchor = Math.abs(x - CX) < 12 ? 'middle' : (x > CX ? 'start' : 'end');
      const na = d.applicable === false || d.score == null;
      const g = d.grade || gradeFromScore(d.score);
      const scoreTxt = na ? '—' : d.score;
      const scoreFill = na ? 'var(--ink-4)' : gradeColor(g);
      svg += '<text x="' + x.toFixed(1) + '" y="' + (y - 3).toFixed(1) + '" text-anchor="' + anchor + '" font-size="11" font-weight="600" fill="' + (na ? 'var(--ink-4)' : 'var(--ink-2)') + '">' + esc(t(d.shortName || d.name)) + '</text>';
      svg += '<text x="' + x.toFixed(1) + '" y="' + (y + 11).toFixed(1) + '" text-anchor="' + anchor + '" font-size="11.5" font-weight="800" fill="' + scoreFill + '">' + scoreTxt + '</text>';
    });
    svg += '</svg><div class="radar-tip" id="radarTip"></div>';
    wrap.innerHTML = svg;
    const tip = document.getElementById('radarTip');
    wrap.querySelectorAll('.rdot').forEach(dot => {
      dot.addEventListener('mouseenter', () => {
        tip.textContent = dot.dataset.name + ' · ' + dot.dataset.score;
        const wr = wrap.getBoundingClientRect(), dr = dot.getBoundingClientRect();
        tip.style.left = (dr.left - wr.left + dr.width / 2) + 'px';
        tip.style.top = (dr.top - wr.top) + 'px';
        tip.style.opacity = 1;
      });
      dot.addEventListener('mouseleave', () => { tip.style.opacity = 0; });
    });
  }

  // ═══ Suggestion inner blocks (shared by key actions & accordion) ═══
  function suggestionInner(s, idx) {
    let h = '<div class="action-body">' + esc(t(s.body)) + '</div>';
    if (s.evidence) h += '<div class="evidence"><b>' + tc('evidence') + '</b>' + esc(t(s.evidence)) + '</div>';
    if (s.promptRewrite) {
      h += '<div class="prompt-block"><div class="prompt-head"><span class="prompt-label">' + tc('promptRewrite') + '</span>' +
        '<button class="copy-btn" data-target="pr-' + idx + '">' + tc('copy') + '</button></div>' +
        '<div class="prompt-text" id="pr-' + idx + '">' + esc(t(s.promptRewrite)) + '</div></div>';
    }
    if (s.assetContent) {
      h += '<div class="asset-block"><div class="prompt-head"><span class="prompt-label">' + tc('assetLabel') +
        (s.assetPath ? ' · ' + esc(s.assetPath) : '') + '</span>' +
        '<button class="copy-btn" data-target="as-' + idx + '">' + tc('copy') + '</button></div>' +
        '<pre id="as-' + idx + '">' + esc(t(s.assetContent)) + '</pre>' +
        '<div class="install-hint">' + tc('installHint') + '</div></div>';
    }
    if (s.expectedImpact) h += '<div class="impact">' + esc(t(s.expectedImpact)) + '</div>';
    return h;
  }
  function suggestionChips(s) {
    const dims = report.dimensions || [];
    const dim = s.dimensionId ? dims.find(d => d.id === s.dimensionId) : null;
    const at = s.actionType && ACTION_NAMES[s.actionType] ? s.actionType : null;
    return '<span class="pill pill-' + (s.priority || 'medium') + '">' + esc(s.priority || 'medium') + '</span>' +
      (at ? '<span class="pill pill-type">' + esc(t(ACTION_NAMES[at])) + '</span>' : '') +
      (dim ? '<span class="pill pill-dim">' + esc(t(dim.name)) + '</span>' : '');
  }

  function render() {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i]').forEach(el => { el.textContent = tc(el.dataset.i); });
    document.getElementById('langZh').classList.toggle('on', lang === 'zh');
    document.getElementById('langEn').classList.toggle('on', lang === 'en');

    const profile = report.profile || {};
    const grade = report.overallGrade || gradeFromScore(report.overallScore);

    document.getElementById('topbarProject').innerHTML =
      '<strong>' + esc(report.project) + '</strong> · ' + fmtDate(report.generatedAt);

    // hero
    document.getElementById('kicker').innerHTML =
      '<span class="chip">' + esc(t(profile.label) || profile.type || '') + '</span>' +
      (profile.confidence ? '<span class="chip neutral">' + esc(profile.confidence) + ' ' + tc('confidence') + '</span>' : '');
    const gl = document.getElementById('gradeLetter');
    gl.textContent = grade; gl.style.color = gradeColor(grade);
    document.getElementById('gradeLabel').textContent = (GRADE_DESC[grade] && GRADE_DESC[grade][lang]) || '';
    document.getElementById('gradeScore').textContent = (report.overallScore != null ? report.overallScore : '–') + ' / 100';
    document.getElementById('insight').textContent = t(report.insight);
    const meta = [];
    if (profile.sessionCount) meta.push(profile.sessionCount + ' ' + (lang === 'en' && profile.sessionCount === 1 ? 'session' : tc('sessions')));
    if (profile.humanMessages) meta.push(profile.humanMessages + ' ' + (lang === 'en' && profile.humanMessages === 1 ? 'message' : tc('messages')));
    if (profile.dateRange && profile.dateRange[0] && profile.dateRange[1]) {
      const days = Math.max(1, Math.round((new Date(profile.dateRange[1]) - new Date(profile.dateRange[0])) / 86400000));
      meta.push(days + ' ' + (lang === 'en' && days === 1 ? 'day' : tc('days')));
    }
    document.getElementById('heroMeta').innerHTML = meta.map(m => '<span class="m">' + esc(m) + '</span>').join('');
    const catScores = report.categoryScores || {};
    document.getElementById('heroCats').innerHTML = ['communication', 'engineering', 'outcome']
      .filter(c => catScores[c] != null)
      .map(c => '<span class="cat-mini"><i style="background:' + catColor(c) + '"></i>' + esc(t(CAT_NAMES[c])) + ' <b>' + catScores[c] + '</b></span>')
      .join('');

    renderRadar();
    renderSince();
    renderFindings();
    renderActions();
    renderDims();

    document.getElementById('profileText').textContent = t((report.diagnosis || {}).collaborationProfile) || '—';
    renderAppendix();
    document.getElementById('footer').textContent = tc('footer');

    // copy buttons
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.onclick = () => {
        const el = document.getElementById(btn.dataset.target);
        if (!el) return;
        navigator.clipboard.writeText(el.textContent).then(() => {
          btn.textContent = tc('copied'); btn.classList.add('copied');
          setTimeout(() => { btn.textContent = tc('copy'); btn.classList.remove('copied'); }, 1500);
        });
      };
    });
  }

  function renderSince() {
    const el = document.getElementById('sinceWrap');
    const s = report.sinceLastRun;
    if (!s) { el.innerHTML = ''; return; }
    const dimNames = {};
    (report.dimensions || []).forEach(d => { dimNames[d.id] = t(d.shortName || d.name); });
    let pills = '';
    if (typeof s.overallDelta === 'number' && s.overallDelta !== 0) {
      pills += '<span class="delta">' + tc('overall') + ' <b class="' + (s.overallDelta > 0 ? 'up' : 'down') + '">' + (s.overallDelta > 0 ? '+' : '') + s.overallDelta + '</b></span>';
    }
    Object.entries(s.dimensionDeltas || {}).forEach(([id, v]) => {
      if (typeof v === 'number' && v !== 0) pills += '<span class="delta">' + esc(dimNames[id] || id) + ' <b class="' + (v > 0 ? 'up' : 'down') + '">' + (v > 0 ? '+' : '') + v + '</b></span>';
    });
    const adopted = (s.adoptedMoves || []).map(a => '<span class="since-adopted">' + esc(t(a)) + '</span>').join(' ');
    el.innerHTML = '<div class="since"><span class="since-label">' + tc('sinceTitle') +
      (s.previousDate ? ' · ' + esc(fmtDate(s.previousDate)) : '') + '</span>' + pills + adopted +
      (s.notes ? '<span class="since-note">' + esc(t(s.notes)) + '</span>' : '') + '</div>';
  }

  function renderFindings() {
    const wrap = document.getElementById('findingCards');
    const hl = getHighlights();
    const dims = report.dimensions || [];
    const dimName = id => { const d = dims.find(x => x.id === id); return d ? t(d.name) : ''; };
    if (hl) {
      wrap.innerHTML = ['strength', 'bottleneck'].map(k => {
        const item = hl[k] || {};
        return '<div class="finding ' + k + '"><div class="finding-label"><span>' + tc(k) + '</span>' +
          (item.dimensionId ? '<span class="finding-dim">' + esc(dimName(item.dimensionId)) + '</span>' : '') +
          '</div><div class="finding-text">' + md(t(item.text)) + '</div></div>';
      }).join('');
    } else {
      const dx = (report.diagnosis || {}).coreDiagnosis;
      wrap.innerHTML = '<div class="finding strength" style="grid-column:1/-1"><div class="finding-text">' + md(t(dx)) + '</div></div>';
    }
    document.getElementById('crossReading').textContent = t((report.diagnosis || {}).crossDimensionReading) || '';
  }

  function renderActions() {
    const list = report.suggestions || [];
    let key = list.filter(s => s.isKeyAction);
    if (!key.length) key = list.slice(0, 2);
    const rest = list.filter(s => !key.includes(s));

    document.getElementById('keyActions').innerHTML = key.map((s, i) => {
      const no = String(i + 1).padStart(2, '0');
      return '<div class="action-card" data-no="' + no + '">' +
        '<div class="action-head">' + suggestionChips(s) + '</div>' +
        '<div class="action-title">' + esc(t(s.title)) + '</div>' +
        suggestionInner(s, 'k' + i) + '</div>';
    }).join('');

    const moreWrap = document.getElementById('moreWrap');
    if (!rest.length) { moreWrap.innerHTML = ''; return; }
    moreWrap.innerHTML = '<div class="more-title">' + tc('moreSuggestions') + ' · ' + rest.length + '</div>' +
      rest.map((s, i) =>
        '<details class="sg"><summary>' + suggestionChips(s) +
        '<span>' + esc(t(s.title)) + '</span><span class="chev">▶</span></summary>' +
        '<div class="sg-body">' + suggestionInner(s, 'm' + i) + '</div></details>'
      ).join('');
  }

  function renderDims() {
    const wrap = document.getElementById('dimGroups');
    const cats = ['communication', 'engineering', 'outcome'];
    const byCat = { communication: [], engineering: [], outcome: [] };
    (report.dimensions || []).forEach(d => { if (byCat[d.category]) byCat[d.category].push(d); });
    const scores = report.categoryScores || {};
    wrap.innerHTML = cats.map(cat => {
      const dims = byCat[cat];
      if (!dims.length) return '';
      const cs = scores[cat];
      const cg = cs != null ? gradeFromScore(cs) : null;
      const gc = gradeColor(cg);
      const head = '<div class="cat-head"><span class="cat-dot" style="background:' + catColor(cat) + '"></span>' +
        '<span class="cat-name">' + esc(t(CAT_NAMES[cat])) + '</span>' +
        '<span class="cat-desc">' + esc(t(CAT_DESC[cat])) + '</span>' +
        '<span class="cat-score">' + (cs != null
          ? '<span class="n" style="color:' + gc + '">' + cs + '</span><span class="grade-chip" style="background:color-mix(in srgb,' + gc + ' 14%, transparent);color:' + gc + '">' + cg + '</span>'
          : '<span class="grade-chip" style="background:var(--card-2);color:var(--ink-4)">N/A</span>') + '</span></div>';
      const rows = dims.map((d, i) => {
        const na = d.applicable === false || d.score == null;
        const g = d.grade || gradeFromScore(d.score);
        const col = na ? 'var(--ink-4)' : gradeColor(g);
        const summary = '<summary>' +
          '<span class="dim-name' + (na ? ' na' : '') + '">' + esc(t(d.name)) + '</span>' +
          '<span class="dim-bar"><span class="dim-fill" style="width:' + (na ? 0 : Math.max(0, Math.min(100, d.score))) + '%;background:' + col + '"></span></span>' +
          '<span class="dim-score' + (na ? ' na' : '') + '" style="color:' + col + '">' + (na ? tc('naLabel') : d.score + ' ' + g) + '</span>' +
          '<span class="chev">▶</span></summary>';
        const evid = (d.evidence && d.evidence.length)
          ? '<ul class="dim-evi">' + d.evidence.map(e => '<li>' + esc(typeof e === 'string' ? e : t(e)) + '</li>').join('') + '</ul>' : '';
        const baseline = (!na && d.baseline != null)
          ? '<div class="dim-baseline">' + tc('baseline') + ' ' + d.baseline + (d.adjustment ? ' · ' + tc('adjustment') + ' ' + (d.adjustment > 0 ? '+' : '') + d.adjustment : '') + '</div>' : '';
        return '<details class="dim">' + summary +
          '<div class="dim-detail">' +
          (d.description ? '<div class="dim-desc">' + esc(t(d.description)) + '</div>' : '') +
          '<div class="dim-reason">' + esc(t(d.reasoning) || (na ? tc('naReason') : '')) + '</div>' +
          evid + baseline + '</div></details>';
      }).join('');
      return '<div class="cat-group">' + head + rows + '</div>';
    }).join('');
  }

  function renderAppendix() {
    const d = report.toolcraftDetails || {};
    const orch = d.orchestration || {};
    const assets = report.projectAssets || {};
    const stats = [
      [tc('toolCalls'), d.totalToolCalls || 0], ['Subagent', d.subagentCalls || 0],
      [tc('planMode'), d.planModeEntries || 0], [tc('customCmds'), (d.customCommands || []).length],
      ['Workflow', orch.workflowRuns || 0], [tc('parallel'), orch.parallelToolBursts || 0],
      [tc('background'), orch.backgroundTasks || 0], ['MCP', (d.mcpServers || []).length]
    ];
    const statHtml = '<div class="stat-grid">' + stats.map(([k, v]) =>
      '<div class="stat"><div class="v">' + v + '</div><div class="k">' + esc(k) + '</div></div>').join('') + '</div>';
    const listOf = arr => (arr && arr.length)
      ? '<ul class="tool-list">' + arr.map(i => '<li><span>' + esc(i.name) + '</span><span class="count">' + i.count + '</span></li>').join('') + '</ul>'
      : '<div class="tool-empty">' + tc('none') + '</div>';
    const assetKeys = [
      ['hasClaudeMd', 'CLAUDE.md'], ['hasMcpJson', '.mcp.json'], ['hasSkillsDir', 'Skills'],
      ['hasMemoryDir', 'Memory'], ['hasAgentsDir', 'Agents'], ['hasCommandsDir', 'Commands'],
      ['hasSettingsJson', 'settings.json'], ['hasAgentsMd', 'AGENTS.md']
    ];
    const pills = assetKeys.map(([k, label]) =>
      '<span class="apill ' + (assets[k] ? 'yes' : '') + '">' + label + '</span>').join('');
    document.getElementById('appendixBody').innerHTML = statHtml +
      '<div class="tool-cols"><div><h4>' + tc('topTools') + '</h4>' + listOf(d.topTools) +
      '<h4>' + tc('skillsUsed') + '</h4>' + listOf(d.skillsUsed) + '</div>' +
      '<div><h4>' + tc('mcpServers') + '</h4>' + listOf(d.mcpServers) +
      '<h4>' + tc('projectAssets') + '</h4><div class="asset-pills">' + pills + '</div></div></div>';
  }

  // toggles
  document.getElementById('langZh').onclick = () => { lang = 'zh'; render(); };
  document.getElementById('langEn').onclick = () => { lang = 'en'; render(); };
  document.getElementById('themeBtn').onclick = () => {
    const cur = document.documentElement.dataset.theme ||
      (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.dataset.theme = cur === 'dark' ? 'light' : 'dark';
    render(); // grade/cat colors are read from CSS vars at render time
  };

  render();
})();
</script>
</body>
</html>
