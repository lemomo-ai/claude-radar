<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Radar · Collaboration Dashboard</title>
<style>
  :root {
    /* Light palette */
    --bg-0: #f5f6fa;
    --bg-1: #ffffff;
    --bg-2: #f0f1f7;
    --bg-3: #e6e7ef;
    --side-bg: #fbfbfd;
    --side-border: rgba(0, 0, 0, 0.06);
    --text-1: #0f0f17;
    --text-2: #3a3a48;
    --text-3: #6a6a7e;
    --text-4: #9090a5;
    --text-5: #b5b5c5;
    --border-1: rgba(0, 0, 0, 0.05);
    --border-2: rgba(0, 0, 0, 0.08);
    --border-3: rgba(0, 0, 0, 0.14);
    --accent: #8b5cf6;
    --accent-2: #a78bfa;
    --accent-soft: rgba(139, 92, 246, 0.08);
    --accent-soft-strong: rgba(139, 92, 246, 0.16);
    --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.03);
    --shadow-card-hover: 0 1px 4px rgba(0, 0, 0, 0.06), 0 8px 28px rgba(0, 0, 0, 0.05);
    --grade-s: #22c55e; --grade-a: #3b82f6; --grade-b: #eab308; --grade-c: #f97316; --grade-d: #ef4444;
    --cat-comm: #8b5cf6;
    --cat-eng: #06b6d4;
    --cat-out: #f59e0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-0: #0a0a12; --bg-1: #11121b; --bg-2: #181923; --bg-3: #20212c;
      --side-bg: #0c0d15; --side-border: rgba(255, 255, 255, 0.06);
      --text-1: #f5f5fa; --text-2: #d1d5db; --text-3: #9ca3af; --text-4: #6b7280; --text-5: #4b5563;
      --border-1: rgba(255,255,255,0.05); --border-2: rgba(255,255,255,0.08); --border-3: rgba(255,255,255,0.12);
      --accent-soft: rgba(139, 92, 246, 0.12);
      --accent-soft-strong: rgba(139, 92, 246, 0.22);
      --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.2);
      --shadow-card-hover: 0 1px 4px rgba(0, 0, 0, 0.4), 0 8px 28px rgba(0, 0, 0, 0.3);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg-0);
    color: var(--text-1);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== App shell ===== */
  .app {
    display: grid;
    grid-template-columns: 248px 1fr;
    min-height: 100vh;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    background: var(--side-bg);
    border-right: 1px solid var(--side-border);
    padding: 22px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 4px 8px 0;
  }
  .brand-mark {
    width: 34px; height: 34px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-mark svg.hex {
    width: 100%; height: 100%;
    color: var(--accent);
  }
  .brand-mark::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
    opacity: 0.15;
    animation: brandPulse 3s ease-in-out infinite;
  }
  @keyframes brandPulse {
    0%, 100% { opacity: 0.15; transform: scale(0.92); }
    50% { opacity: 0.35; transform: scale(1.08); }
  }
  .brand-name {
    font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text-1);
  }
  .brand-version {
    font-size: 9px; color: var(--text-4);
    margin-top: 2px;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-section {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-5);
    padding: 4px 12px 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    color: var(--text-3);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
  }
  .nav-item:hover { background: var(--bg-2); color: var(--text-1); }
  .nav-item.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }
  .nav-item.active::before {
    content: "";
    position: absolute; left: 0; top: 14px; bottom: 14px; width: 2px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.9; }

  .side-project-card {
    margin-top: auto;
    background: var(--bg-2);
    border-radius: 10px;
    padding: 14px;
    border: 1px solid var(--border-1);
  }
  .side-project-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-5); margin-bottom: 6px;
  }
  .side-project-name {
    font-size: 13px; font-weight: 700; color: var(--text-1); margin-bottom: 4px;
    word-break: break-all;
  }
  .side-project-meta {
    font-size: 11px; color: var(--text-4); line-height: 1.5;
  }
  .side-grade {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 8px;
    font-size: 11px; font-weight: 700;
  }
  .side-grade-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  /* ===== Main column ===== */
  .main {
    padding: 32px 40px 80px;
    min-width: 0;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border-1);
  }
  .breadcrumb {
    font-size: 12px; color: var(--text-4);
    letter-spacing: 0.3px;
  }
  .breadcrumb strong { color: var(--text-2); font-weight: 600; }
  .topbar-meta {
    font-size: 11px; color: var(--text-5);
    letter-spacing: 0.3px;
  }

  .section {
    margin-bottom: 56px;
    scroll-margin-top: 24px;
  }
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px;
  }
  .section-title {
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.3px;
    color: var(--text-3);
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::before {
    content: ""; display: block; width: 18px; height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .section-hint {
    font-size: 11px; color: var(--text-5);
    letter-spacing: 0.3px;
  }

  /* ===== Hero ===== */
  .hero {
    background:
      radial-gradient(ellipse at 15% 20%, rgba(139,92,246,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 80%, rgba(6,182,212,0.06) 0%, transparent 55%),
      linear-gradient(170deg, var(--bg-1) 0%, var(--bg-0) 100%);
    border: 1px solid var(--border-2);
    border-radius: 18px;
    padding: 32px 36px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 36px;
    align-items: center;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: ""; position: absolute; right: -100px; top: -100px;
    width: 360px; height: 360px;
    background: radial-gradient(circle, var(--accent-soft), transparent 60%);
    pointer-events: none;
  }
  .profile-badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 12px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
    font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
    margin-bottom: 14px;
  }
  .profile-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent);
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0% { box-shadow: 0 0 0 0 rgba(139,92,246,0.6); }
    70% { box-shadow: 0 0 0 8px rgba(139,92,246,0); }
    100% { box-shadow: 0 0 0 0 rgba(139,92,246,0); }
  }
  .insight {
    font-size: 23px; font-weight: 600;
    line-height: 1.4; color: var(--text-1);
    margin: 0 0 16px; letter-spacing: -0.3px;
    max-width: 560px;
  }
  .hero-meta-line { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: var(--text-4); }
  .hero-meta-line span { display: inline-flex; align-items: center; gap: 5px; }
  .hero-meta-line span::before { content: "•"; color: var(--text-5); }
  .hero-meta-line span:first-child::before { content: none; }

  .hero-right {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .hero-radar-bg {
    position: absolute;
    inset: -10px;
    pointer-events: none;
    opacity: 0.5;
  }
  .grade-letter {
    font-size: 96px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -4px;
    filter: drop-shadow(0 0 28px currentColor);
    position: relative;
    z-index: 1;
  }
  .grade-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    margin-top: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .grade-score {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-4);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* ===== Scorecards (3-card) ===== */
  .scorecards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .scorecard {
    background: var(--bg-1);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    padding: 22px 22px 20px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: all 0.2s ease;
  }
  .scorecard:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-card-hover);
  }
  .scorecard::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--cat-color);
  }
  .scorecard[data-cat="communication"] { --cat-color: var(--cat-comm); }
  .scorecard[data-cat="engineering"] { --cat-color: var(--cat-eng); }
  .scorecard[data-cat="outcome"] { --cat-color: var(--cat-out); }
  .scorecard-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .scorecard-name { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; }
  .scorecard-score-block { display: flex; align-items: baseline; gap: 7px; }
  .scorecard-num { font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
  .scorecard-grade { font-size: 11px; font-weight: 800; padding: 3px 7px; border-radius: 5px; letter-spacing: 0.3px; }
  .scorecard-desc { font-size: 11px; color: var(--text-4); margin: 8px 0 16px; line-height: 1.5; min-height: 32px; }
  .scorecard-dims { display: flex; flex-direction: column; gap: 11px; }
  .sc-dim-row { display: grid; grid-template-columns: 1fr 36px; gap: 10px; align-items: center; }
  .sc-dim-name { font-size: 12px; color: var(--text-2); font-weight: 500; }
  .sc-dim-name.na { color: var(--text-5); font-style: italic; }
  .sc-dim-score { font-size: 12px; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
  .sc-dim-bar { grid-column: 1 / -1; height: 3px; background: var(--bg-3); border-radius: 999px; overflow: hidden; }
  .sc-dim-fill { height: 100%; border-radius: 999px; transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* ===== Diagnosis cards ===== */
  .card {
    background: var(--bg-1);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    padding: 24px 26px;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }
  .card-grid { display: grid; gap: 14px; }
  .card-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-5);
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .card-label .label-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .core-diagnosis { font-size: 15px; line-height: 1.7; color: var(--text-1); }
  .core-diagnosis strong { color: var(--accent); font-weight: 700; }
  .profile-text { font-size: 14px; line-height: 1.75; color: var(--text-2); }
  .cross-reading {
    background: var(--bg-2); border-radius: 10px; padding: 16px 20px;
    border-left: 3px solid var(--accent);
    font-size: 13.5px; line-height: 1.65; color: var(--text-2);
    font-style: italic;
  }

  /* ===== Suggestions ===== */
  .suggestions { display: flex; flex-direction: column; gap: 14px; }
  .suggestion {
    background: var(--bg-1);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    padding: 22px 24px;
    box-shadow: var(--shadow-card);
    transition: all 0.18s ease;
  }
  .suggestion:hover {
    border-color: var(--border-3);
    box-shadow: var(--shadow-card-hover);
  }
  .suggestion-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .priority-pill {
    font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 5px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .priority-high { background: rgba(239,68,68,0.15); color: #dc2626; }
  .priority-medium { background: rgba(234,179,8,0.15); color: #a16207; }
  .priority-low { background: rgba(59,130,246,0.15); color: #2563eb; }
  @media (prefers-color-scheme: dark) {
    .priority-high { color: #f87171; }
    .priority-medium { color: #fbbf24; }
    .priority-low { color: #60a5fa; }
  }
  .dim-tag {
    font-size: 10px; font-weight: 600; padding: 3px 9px;
    border-radius: 5px; background: var(--bg-3); color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .suggestion-title {
    font-size: 15.5px; font-weight: 700; color: var(--text-1);
    flex: 1; min-width: 0;
  }
  .suggestion-body { font-size: 13.5px; color: var(--text-2); line-height: 1.65; margin-bottom: 12px; }
  .suggestion-evidence {
    font-size: 12px; color: var(--text-4); line-height: 1.55;
    padding: 11px 15px; background: var(--bg-2); border-radius: 8px;
    margin-bottom: 10px;
    border-left: 2px solid var(--border-3);
  }
  .suggestion-evidence::before { content: "📌 "; opacity: 0.55; }
  .prompt-rewrite-block {
    margin-top: 10px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-soft-strong);
    border-radius: 10px; padding: 14px 16px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; color: var(--text-1); line-height: 1.6;
  }
  .prompt-rewrite-label {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 10px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .copy-btn {
    background: transparent; border: 1px solid var(--border-3); color: var(--text-4);
    padding: 3px 10px; border-radius: 6px; font-size: 10px;
    font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.15s ease;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .copy-btn.copied { color: #16a34a; border-color: #16a34a; }
  .expected-impact {
    margin-top: 12px; font-size: 11.5px; color: var(--text-4);
    display: flex; align-items: center; gap: 5px;
  }
  .expected-impact::before { content: "→"; color: var(--accent-2); font-weight: 700; }

  /* ===== Dimension detail grid ===== */
  /* Dimension grid: ALWAYS 3 columns (3 rows naturally form by category since dimensionOrder is grouped).
     Only collapses to 1 column on actual mobile widths (< 600px). */
  .dim-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
  @media (max-width: 600px) { .dim-grid { grid-template-columns: 1fr; } }
  .dim-detail-card {
    background: var(--bg-1); border: 1px solid var(--border-2);
    border-radius: 12px; padding: 20px 22px;
    box-shadow: var(--shadow-card);
    position: relative;
    border-top: 3px solid var(--cat-color);
  }
  .dim-detail-card[data-cat="communication"] { --cat-color: var(--cat-comm); }
  .dim-detail-card[data-cat="engineering"] { --cat-color: var(--cat-eng); }
  .dim-detail-card[data-cat="outcome"] { --cat-color: var(--cat-out); }
  .dim-detail-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px;
  }
  .dim-detail-name { font-size: 14.5px; font-weight: 700; color: var(--text-1); }
  .dim-detail-cat {
    font-size: 10px; font-weight: 600; color: var(--cat-color);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .dim-detail-score { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .dim-detail-score.na {
    font-size: 11px; font-weight: 700; color: var(--text-5);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .dim-detail-desc { font-size: 11px; color: var(--text-4); line-height: 1.5; margin-bottom: 12px; }
  .dim-detail-reasoning { font-size: 12.5px; color: var(--text-2); line-height: 1.65; margin-bottom: 12px; }
  .dim-detail-evidence { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 5px; }
  .dim-detail-evidence li {
    font-size: 11px; color: var(--text-4); padding-left: 14px; position: relative; line-height: 1.55;
  }
  .dim-detail-evidence li::before {
    content: "→"; position: absolute; left: 0;
    color: var(--cat-color); opacity: 0.6;
  }

  /* ===== Toolcraft section ===== */
  .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .tool-block {
    background: var(--bg-1); border: 1px solid var(--border-2);
    border-radius: 12px; padding: 18px 20px;
    box-shadow: var(--shadow-card);
  }
  .tool-block h4 {
    font-size: 11px; font-weight: 700; color: var(--text-3);
    margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.7px;
  }
  .tool-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 7px; }
  .tool-list li {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12.5px; color: var(--text-2);
    padding: 3px 0;
  }
  .tool-list .count {
    color: var(--text-4); font-variant-numeric: tabular-nums;
    font-weight: 600; font-size: 11.5px;
  }
  .tool-empty { font-size: 11.5px; color: var(--text-5); font-style: italic; }
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-pill {
    font-size: 11.5px;
    padding: 8px 12px; border-radius: 8px;
    background: var(--bg-2); color: var(--text-2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .stat-pill .stat-num { font-weight: 700; color: var(--text-1); font-variant-numeric: tabular-nums; }
  .asset-pill {
    font-size: 11.5px; padding: 7px 12px; border-radius: 7px;
    background: var(--bg-2); color: var(--text-3);
    display: flex; align-items: center; gap: 7px;
  }
  .asset-pill.present { background: rgba(34,197,94,0.12); color: #15803d; }
  .asset-pill.absent { opacity: 0.6; }
  @media (prefers-color-scheme: dark) {
    .asset-pill.present { color: #4ade80; }
  }
  .asset-pill::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.7; }

  /* ===== Footer ===== */
  footer {
    margin-top: 60px; padding-top: 22px;
    border-top: 1px solid var(--border-1);
    color: var(--text-5); font-size: 11px; text-align: center; letter-spacing: 0.4px;
  }

  /* ===== Responsive ===== */
  @media (max-width: 980px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: relative; height: auto; top: auto;
      flex-direction: row; align-items: center;
      padding: 14px 20px;
      gap: 18px;
      overflow-x: auto;
    }
    .brand { padding: 0; }
    .nav { flex-direction: row; gap: 4px; flex: 1; }
    .nav-section { display: none; }
    .nav-item { padding: 7px 12px; white-space: nowrap; }
    .nav-item.active::before { display: none; }
    .side-project-card { display: none; }
    .main { padding: 24px 22px 60px; }
    .hero { grid-template-columns: 1fr; text-align: center; padding: 28px 24px; }
    .hero-meta-line { justify-content: center; }
    .scorecards { grid-template-columns: 1fr; }
    .tool-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 520px) {
    .insight { font-size: 18px; }
    .grade-letter { font-size: 72px; }
  }
  @media print {
    .sidebar { display: none; }
    .app { grid-template-columns: 1fr; }
    .main { padding: 0; max-width: 100%; }
    .suggestion, .scorecard, .dim-detail-card, .tool-block, .hero, .card { break-inside: avoid; }
  }

  /* Smooth scroll */
  html { scroll-behavior: smooth; }
</style>
</head>
<body>

<div class="app">
  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg class="hex" viewBox="0 0 32 32" fill="none">
          <polygon points="16 3 28 9.5 28 22.5 16 29 4 22.5 4 9.5" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
          <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
        </svg>

      <div>
        <div class="brand-name">Claude Radar</div>
        <div class="brand-version">DASHBOARD</div>

    </div>

    <nav class="nav">
      <div class="nav-section" data-en="Report" data-zh="报告"></div>
      <a class="nav-item" href="#overview" data-section="overview">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span data-en="Overview" data-zh="总览"></span>
      </a>
      <a class="nav-item" href="#diagnosis" data-section="diagnosis">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.5" fill="currentColor"/></svg>
        <span data-en="Diagnosis" data-zh="诊断"></span>

        <span data-en="Plan" data-zh="改进方案"></span>
      </a>
      <a class="nav-item" href="#dimensions" data-section="dimensions">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/><polyline points="12 22 12 15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/><polyline points="2 15.5 12 8.5 22 15.5"/><polyline points="12 2 12 8.5"/></svg>
        <span data-en="Dimensions" data-zh="九维详解"></span>
      </a>
      <a class="nav-item" href="#toolcraft" data-section="toolcraft">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        <span data-en="Toolcraft" data-zh="工具与架构"></span>
      </a>
    </nav>

    <div class="side-project-card" id="sideProjectCard"></div>
  </aside>

  <!-- ═══ Main column ═══ -->
  <main class="main">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="topbar-meta" id="topbarMeta"></div>
    </div>

    <!-- ─── Overview ─── -->
    <section class="section" id="overview">
      <div class="section-header">

      <div class="hero">

    <!-- ─── Diagnosis ─── -->
    <section class="section" id="diagnosis">
      <div class="section-header">
        <div class="section-title" data-en="DIAGNOSIS" data-zh="诊断"></div>
        <div class="section-hint" data-en="What's working and what's not" data-zh="什么在用、什么卡住"></div>
      </div>
      <div class="card-grid">
        <div class="card">
          <div class="card-label"><span class="label-dot"></span><span data-en="CORE DIAGNOSIS" data-zh="核心诊断"></span></div>
          <div class="core-diagnosis" id="coreDiagnosis"></div>
        </div>
        <div class="card">
          <div class="card-label"><span class="label-dot"></span><span data-en="COLLABORATION PROFILE" data-zh="协作画像"></span></div>
          <div class="profile-text" id="profileText"></div>

        <div class="section-title" data-en="TOOLCRAFT &amp; ARCHITECTURE" data-zh="工具与架构"></div>

    <footer id="footer"></footer>
  </main>
</div>

<script id="report-data" type="application/json">{{REPORT_DATA}}</script>

<script>
(function() {
  const GRADE_COLORS = { S: '#22c55e', A: '#3b82f6', B: '#eab308', C: '#f97316', D: '#ef4444' };
  const GRADE_BG = {
    S: 'rgba(34,197,94,0.13)', A: 'rgba(59,130,246,0.13)',
    B: 'rgba(234,179,8,0.13)', C: 'rgba(249,115,22,0.13)', D: 'rgba(239,68,68,0.13)'
  };
  const GRADE_DESC = {
    S: { en: 'In The Zone', zh: '心流共振' },
    A: { en: 'Synced Up', zh: '默契搭档' },
    B: { en: 'Finding Groove', zh: '稳步探索' },
    C: { en: 'Freestyling', zh: '随性对话' },
    D: { en: 'Day One', zh: '初识旅程' }
  };
  const CAT_NAMES = {
    communication: { en: 'Communication', zh: '沟通力' },
    engineering: { en: 'Engineering', zh: '工程力' },
    outcome: { en: 'Outcome', zh: '成效' }
  };
  const CAT_DESC = {
    communication: { en: 'How clearly you direct AI.', zh: '你怎么用文字驱动 AI。' },
    engineering: { en: 'How well you leverage the platform.', zh: '你把平台用到几成。' },
    outcome: { en: 'What actually gets shipped.', zh: '实际产出的质量。' }
  };
  const I18N = {
    sessions: { en: 'sessions', zh: '个会话' },
    messages: { en: 'messages', zh: '条消息' },
    days: { en: 'days', zh: '天' },
    confidence: { en: 'confidence', zh: '可信度' },
    promptRewrite: { en: 'TRY THIS PROMPT', zh: '复制这段试试' },
    copy: { en: 'Copy', zh: '复制' },
    copied: { en: 'Copied', zh: '已复制' },
    footer: { en: 'Claude Radar — Local analysis, zero telemetry.', zh: 'Claude Radar — 全本地分析，零数据上传。' },
    project: { en: 'Project', zh: '项目' },
    overall: { en: 'Overall', zh: '总分' }
  };

  function gradeFromScore(s) {
    if (s == null) return null;
    if (s >= 85) return 'S';
    if (s >= 70) return 'A';
    if (s >= 55) return 'B';
    if (s >= 40) return 'C';
    return 'D';
  }

  let report;
  try { report = JSON.parse(document.getElementById('report-data').textContent); }
  catch (e) {
    document.body.innerHTML = '<div style="padding:40px;font-family:monospace">Failed to parse report data: ' + e.message + '</div>';
    return;
  }

  let lang = report.language || 'zh';

  function t(field) {
    if (field == null) return '';
    if (typeof field === 'string') return field;
    if (typeof field === 'object') return field[lang] || field.en || field.zh || '';
    return String(field);
  }
  function tc(key) { return (I18N[key] && I18N[key][lang]) || (I18N[key] && I18N[key].en) || ''; }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString(lang === 'zh' ? 'zh-CN' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    } catch { return iso; }
  }
  function firstSentence(s) {
    if (!s) return '';
    // Split on sentence-ending punctuation that's followed by whitespace+capital, CJK char, ** (markdown bold), or end-of-string.
    // This avoids breaking inside numbers like "1.33" where "." is followed by a digit.
    const parts = s.split(/(?<=[.。！!？?])(?=\s+[A-Z一-鿿*]|[一-鿿]|\*\*|$)/);
    for (const p of parts) {
      const t = p.trim();
      if (t.length > 10) return t;
    }
    return s.slice(0, 120);
  }
  function formatDiagnosis(s) {
    return escapeHtml(s).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  }

  function render() {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-en]').forEach(el => {
      el.textContent = el.dataset[lang] || el.dataset.en;
    });

    const profile = report.profile || {};
    const grade = report.overallGrade || gradeFromScore(report.overallScore || 0);

    // ── Topbar ──
    document.getElementById('breadcrumb').innerHTML =
      '<span>' + tc('project') + '</span> / <strong>' + escapeHtml(report.project) + '</strong>';
    document.getElementById('topbarMeta').textContent =
      formatDate(report.generatedAt) + ' · ' + (profile.confidence || '—') + ' ' + tc('confidence');

    // ── Sidebar project card ──
    const sidePc = document.getElementById('sideProjectCard');
    const sideMeta = [];
    if (profile.sessionCount) sideMeta.push(profile.sessionCount + ' ' + tc('sessions'));
    if (profile.humanMessages) sideMeta.push(profile.humanMessages + ' ' + tc('messages'));
    sidePc.innerHTML =
      '<div class="side-project-label">' + tc('project') + '</div>' +
      '<div class="side-project-name">' + escapeHtml(report.project) + '</div>' +
      '<div class="side-project-meta">' + sideMeta.join(' · ') + '</div>' +
      '<div class="side-grade"><span class="side-grade-dot" style="background:' + GRADE_COLORS[grade] + '"></span><span style="color:' + GRADE_COLORS[grade] + '">' + grade + ' · ' + (report.overallScore != null ? report.overallScore : '–') + '</span></div>';

    // ── Hero ──
    document.getElementById('profileLabel').textContent = t(profile.label) || profile.type || '';
    document.getElementById('insight').textContent = t(report.insight) || (report.diagnosis && firstSentence(t(report.diagnosis.coreDiagnosis).replace(/\*\*/g, '')));

    const heroMetaLine = document.getElementById('heroMetaLine');
    const metaItems = [];
    if (profile.sessionCount) metaItems.push(profile.sessionCount + ' ' + tc('sessions'));
    if (profile.humanMessages) metaItems.push(profile.humanMessages + ' ' + tc('messages'));
    if (profile.dateRange && profile.dateRange[0] && profile.dateRange[1]) {
      const days = Math.max(1, Math.round((new Date(profile.dateRange[1]) - new Date(profile.dateRange[0])) / 86400000));
      metaItems.push(days + ' ' + tc('days'));
    }
    if (profile.confidence) metaItems.push(profile.confidence + ' ' + tc('confidence'));
    heroMetaLine.innerHTML = metaItems.map(s => '<span>' + escapeHtml(s) + '</span>').join('');

    const gradeLetter = document.getElementById('gradeLetter');
    gradeLetter.textContent = grade;
    gradeLetter.style.color = GRADE_COLORS[grade] || '#888';
    document.getElementById('gradeLabel').textContent = (GRADE_DESC[grade] && GRADE_DESC[grade][lang]) || '';
    document.getElementById('gradeScore').textContent = (report.overallScore != null ? report.overallScore : '–') + ' / 100';

    renderScorecards(report);
    renderDiagnosis(report);
    renderSuggestions(report);
    renderDimDetails(report);
    renderToolcraft(report);

    document.getElementById('footer').textContent = tc('footer');

    setupNavObserver();
  }

  function renderScorecards(report) {
    const wrap = document.getElementById('scorecards');
    wrap.innerHTML = '';
    const cats = ['communication', 'engineering', 'outcome'];
    const dimsByCat = { communication: [], engineering: [], outcome: [] };
    (report.dimensions || []).forEach(d => { if (dimsByCat[d.category]) dimsByCat[d.category].push(d); });
    const scores = report.categoryScores || {};

    cats.forEach(cat => {
      const dims = dimsByCat[cat];
      if (!dims || !dims.length) return;
      const catScore = scores[cat];
      const catGrade = catScore != null ? gradeFromScore(catScore) : null;
      const card = document.createElement('div');
      card.className = 'scorecard';
      card.dataset.cat = cat;
      const catName = (CAT_NAMES[cat] && CAT_NAMES[cat][lang]) || cat;
      const catDesc = (CAT_DESC[cat] && CAT_DESC[cat][lang]) || '';

      let dimsHtml = '';
      dims.forEach(d => {
        const naClass = d.applicable === false ? ' na' : '';
        const scoreText = d.applicable === false ? 'N/A' : (d.score != null ? d.score : '–');
        const dimGrade = d.grade || (d.score != null ? gradeFromScore(d.score) : null);
        const color = dimGrade ? GRADE_COLORS[dimGrade] : '#888';
        const fillWidth = (d.applicable === false || d.score == null) ? 0 : Math.max(0, Math.min(100, d.score));
        dimsHtml +=
          '<div class="sc-dim-row">' +
            '<div class="sc-dim-name' + naClass + '">' + escapeHtml(t(d.name)) + '</div>' +
            '<div class="sc-dim-score" style="color:' + color + '">' + escapeHtml(String(scoreText)) + '</div>' +
            '<div class="sc-dim-bar"><div class="sc-dim-fill" style="width:' + fillWidth + '%;background:' + color + '"></div></div>' +
          '</div>';
      });

      let scoreBlock = '';
      if (catScore != null) {
        scoreBlock = '<div class="scorecard-score-block">' +
          '<div class="scorecard-num" style="color:' + GRADE_COLORS[catGrade] + '">' + catScore + '</div>' +
          '<div class="scorecard-grade" style="background:' + GRADE_BG[catGrade] + ';color:' + GRADE_COLORS[catGrade] + '">' + catGrade + '</div>' +
          '</div>';
      } else {
        scoreBlock = '<div class="scorecard-grade" style="background:var(--bg-3);color:var(--text-5)">N/A</div>';
      }

      card.innerHTML =
        '<div class="scorecard-head">' +
          '<div class="scorecard-name">' + escapeHtml(catName) + '</div>' +
          scoreBlock +
        '</div>' +
        '<div class="scorecard-desc">' + escapeHtml(catDesc) + '</div>' +
        '<div class="scorecard-dims">' + dimsHtml + '</div>';
      wrap.appendChild(card);
    });
  }

  function renderDiagnosis(report) {
    const dx = report.diagnosis || {};
    document.getElementById('coreDiagnosis').innerHTML = formatDiagnosis(t(dx.coreDiagnosis) || '—');
    document.getElementById('profileText').textContent = t(dx.collaborationProfile) || '—';
    document.getElementById('crossReading').textContent = t(dx.crossDimensionReading) || '—';
  }

  function renderSuggestions(report) {
    const sDiv = document.getElementById('suggestions');
    sDiv.innerHTML = '';
    const list = report.suggestions || [];
    if (!list.length) {
      sDiv.innerHTML = '<div style="color:var(--text-4);font-size:13px;font-style:italic">No critical bottlenecks — keep doing what you are doing.</div>';
      return;
    }
    list.forEach((s, idx) => {
      const priority = s.priority || 'medium';
      const dimId = s.dimensionId;
      const matchedDim = dimId ? (report.dimensions || []).find(d => d.id === dimId) : null;
      const div = document.createElement('div');
      div.className = 'suggestion';
      div.innerHTML =
        '<div class="suggestion-head">' +
          '<span class="priority-pill priority-' + priority + '">' + priority + '</span>' +
          (matchedDim ? '<span class="dim-tag">' + escapeHtml(t(matchedDim.name)) + '</span>' : '') +
          '<div class="suggestion-title">' + escapeHtml(t(s.title)) + '</div>' +
        '</div>' +
        '<div class="suggestion-body">' + escapeHtml(t(s.body)) + '</div>' +
        (s.evidence ? '<div class="suggestion-evidence">' + escapeHtml(t(s.evidence)) + '</div>' : '') +
        (s.promptRewrite ? (
          '<div class="prompt-rewrite-block">' +
            '<div class="prompt-rewrite-label">' +
              '<span>' + tc('promptRewrite') + '</span>' +
              '<button class="copy-btn" data-idx="' + idx + '">' + tc('copy') + '</button>' +
            '</div>' +
            '<div class="prompt-rewrite-text" id="prompt-' + idx + '">' + escapeHtml(t(s.promptRewrite)) + '</div>' +
          '</div>'
        ) : '') +
        (s.expectedImpact ? '<div class="expected-impact">' + escapeHtml(t(s.expectedImpact)) + '</div>' : '');
      sDiv.appendChild(div);
    });

    sDiv.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = btn.dataset.idx;
        const text = document.getElementById('prompt-' + idx).textContent;
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = tc('copied');
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = tc('copy'); btn.classList.remove('copied'); }, 1500);
        });
      });
    });
  }

  function renderDimDetails(report) {
    const grid = document.getElementById('dimGrid');
    grid.innerHTML = '';
    (report.dimensions || []).forEach(d => {
      const card = document.createElement('div');
      card.className = 'dim-detail-card';
      card.dataset.cat = d.category;
      const isNA = d.applicable === false;
      const grade = d.grade || (d.score != null ? gradeFromScore(d.score) : null);
      const color = grade ? GRADE_COLORS[grade] : 'var(--text-5)';
      const catName = (CAT_NAMES[d.category] && CAT_NAMES[d.category][lang]) || d.category;
      card.innerHTML =
        '<div class="dim-detail-cat">' + escapeHtml(catName) + '</div>' +
        '<div class="dim-detail-head">' +
          '<div class="dim-detail-name">' + escapeHtml(t(d.name)) + '</div>' +
          '<div class="dim-detail-score ' + (isNA ? 'na' : '') + '" style="color:' + color + '">' +
            (isNA ? 'N/A' : (d.score != null ? d.score : '–')) +
          '</div>' +
        '</div>' +
        '<div class="dim-detail-desc">' + escapeHtml(t(d.description)) + '</div>' +
        '<div class="dim-detail-reasoning">' + escapeHtml(t(d.reasoning)) + '</div>' +
        (d.evidence && d.evidence.length
          ? '<ul class="dim-detail-evidence">' + d.evidence.map(e => '<li>' + escapeHtml(typeof e === 'string' ? e : t(e)) + '</li>').join('') + '</ul>'
          : '');
      grid.appendChild(card);
    });
  }

  function renderToolcraft(report) {
    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '';
    const tc_d = report.toolcraftDetails || {};
    const assets = report.projectAssets || {};

    function block(titleEn, titleZh, contentHtml) {
      const title = lang === 'zh' ? titleZh : titleEn;
      return '<div class="tool-block"><h4>' + escapeHtml(title) + '</h4>' + contentHtml + '</div>';
    }
    function listFromArray(arr, emptyEn, emptyZh) {
      if (!arr || !arr.length) {
        return '<div class="tool-empty">' + (lang === 'zh' ? emptyZh : emptyEn) + '</div>';
      }
      return '<ul class="tool-list">' + arr.map(item =>
        '<li><span>' + escapeHtml(item.name) + '</span><span class="count">' + item.count + '</span></li>'
      ).join('') + '</ul>';
    }

    // Quick stats block (always first)
    const quickHtml =
      '<div class="stat-grid">' +
        '<div class="stat-pill"><span>' + (lang === 'zh' ? '工具调用' : 'Tool calls') + '</span><span class="stat-num">' + (tc_d.totalToolCalls || 0) + '</span></div>' +
        '<div class="stat-pill"><span>Subagent</span><span class="stat-num">' + (tc_d.subagentCalls || 0) + '</span></div>' +
        '<div class="stat-pill"><span>Plan mode</span><span class="stat-num">' + (tc_d.planModeEntries || 0) + '</span></div>' +
        '<div class="stat-pill"><span>' + (lang === 'zh' ? '自定义命令' : 'Custom cmds') + '</span><span class="stat-num">' + ((tc_d.customCommands && tc_d.customCommands.length) || 0) + '</span></div>' +
      '</div>';
    grid.insertAdjacentHTML('beforeend', block('Quick stats', '快览', quickHtml));

    grid.insertAdjacentHTML('beforeend',
      block('Skills used', '使用的 Skill',
        listFromArray(tc_d.skillsUsed, 'No skills invoked', '没有调用过 skill')));

    grid.insertAdjacentHTML('beforeend',
      block('MCP servers', 'MCP 服务',
        listFromArray(tc_d.mcpServers, 'No MCP servers used', '没有使用过 MCP')));

    grid.insertAdjacentHTML('beforeend',
      block('Top tools', '高频工具',
        listFromArray(tc_d.topTools, 'No tool usage recorded', '未记录工具调用')));

    // Project assets block
    const assetItems = [
      { key: 'hasClaudeMd', label: { en: 'CLAUDE.md', zh: 'CLAUDE.md' } },
      { key: 'hasMemoryDir', label: { en: 'Memory dir', zh: 'Memory 目录' } },
      { key: 'hasAgentsDir', label: { en: 'Agents dir', zh: 'Agents 目录' } },
      { key: 'hasCommandsDir', label: { en: 'Commands dir', zh: '自定义命令目录' } },
      { key: 'hasSettingsJson', label: { en: 'settings.json', zh: 'settings.json' } }
    ];
    let pillsHtml = '<div class="stat-grid">';
    if (!assets.cwdResolved) {
      pillsHtml += '<div class="tool-empty" style="grid-column: 1 / -1">' +
        (lang === 'zh' ? '未能定位项目工作目录，跳过资产检测' : 'Project working directory not located on this machine.') +
        '</div>';
    } else {
      assetItems.forEach(it => {
        const present = !!assets[it.key];
        pillsHtml += '<div class="asset-pill ' + (present ? 'present' : 'absent') + '">' + escapeHtml(t(it.label)) + '</div>';
      });
    }
    pillsHtml += '</div>';
    const extraStats = [];
    if (assets.cwdResolved && assets.hasClaudeMd && assets.claudeMdSize) {
      extraStats.push((lang === 'zh' ? 'CLAUDE.md：' : 'CLAUDE.md: ') + assets.claudeMdSize + ' bytes');
    }
    if (assets.memoryFileCount) extraStats.push((lang === 'zh' ? 'Memory：' : 'Memory: ') + assets.memoryFileCount);
    if (assets.agentCount) extraStats.push((lang === 'zh' ? 'Agents：' : 'Agents: ') + assets.agentCount);
    if (assets.commandCount) extraStats.push((lang === 'zh' ? '命令数：' : 'Commands: ') + assets.commandCount);
    if (extraStats.length) {
      pillsHtml += '<div style="margin-top:10px;font-size:11px;color:var(--text-4);line-height:1.6">' +
        extraStats.map(escapeHtml).join(' · ') + '</div>';
    }
    grid.insertAdjacentHTML('beforeend', block('Project assets', '项目资产', pillsHtml));
  }

  // ── Nav active-state on scroll ──
  function setupNavObserver() {
    const sections = document.querySelectorAll('.section');
    const navItems = document.querySelectorAll('.nav-item');
    const navById = {};
    navItems.forEach(item => { navById[item.dataset.section] = item; });

    const observer = new IntersectionObserver((entries) => {
      const visible = entries
        .filter(e => e.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
      if (visible.length) {
        const activeId = visible[0].target.id;
        navItems.forEach(item => item.classList.toggle('active', item.dataset.section === activeId));
      }
    }, { rootMargin: '-30% 0px -55% 0px', threshold: [0, 0.25, 0.5, 0.75, 1] });

    sections.forEach(s => observer.observe(s));

    // Default: first section active
    if (navById.overview) navById.overview.classList.add('active');
  }

  render();
})();
</script>
</body>
</html>
